<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>NFT Preview Card</title>
  </head>
  <body>
    <div class="card">
      <div class="card-image">
        <img src="./images/image-equilibrium.jpg" alt="" />
        <div class="overlay">
          <img src="./images/icon-view.svg" alt="" />
        </div>
      </div>
      <div class="card-details">
        <div class="card-title"><h1>Equilibrium #3429</h1></div>
        <div class="card-info">
          <p>Our Equilibrium collection promotes balance and calm.</p>
        </div>
        <div class="card-extra">
          <div class="card-cost">
            <img src="./images/icon-ethereum.svg" alt="" />
            <p>0.041 ETH</p>
          </div>
          <div class="card-time">
            <img id="main-img" src="./images/icon-clock.svg" alt="" />
            <p>3 days let</p>
          </div>
        </div>
        <div class="rule"></div>
        <div class="card-avatar">
          <img src="./images/image-avatar.png" alt="user-avatar" />
          <p class="user-info">Creation of <span>Jules Wyvern</span></p>
        </div>
      </div>
    </div>
  </body>
</html>
